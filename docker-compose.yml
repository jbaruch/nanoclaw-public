services:
  nanoclaw:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: nanoclaw
    restart: always
    volumes:
      # Docker socket for spawning sibling agent containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data directories
      - ./store:/app/store
      - ./data:/app/data
      - ./groups:/app/groups
      - ./logs:/app/logs
      # Credentials (mounted, never baked into image)
      - ./.env:/app/.env:ro
      # Shared trusted directory (mounted into trusted + main agent containers)
      - ./trusted:/app/trusted
      # NanoClaw config (mount allowlist, sender allowlist)
      - ${HOME}/.config/nanoclaw:/root/.config/nanoclaw:ro
      # Tessl: credentials + persistent workspace for registry installs
      - ${HOME}/.tessl:/root/.tessl
      - ./tessl-workspace:/app/tessl-workspace
    environment:
      # Docker-out-of-Docker: mount paths must reference the HOST filesystem
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT:-.}
      # Host user UID/GID for agent container --user flag
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      # Credential proxy binds to all interfaces so agent containers can reach it
      - CREDENTIAL_PROXY_HOST=0.0.0.0
      - TZ=America/Chicago
      - NODE_ENV=production
      # Agent-image override (#69 review): src/config.ts reads
      # process.env.CONTAINER_IMAGE to decide which image to spawn
      # agent containers from; scripts/deploy.sh reads the same env
      # var to decide which image to rebuild locally. Both must come
      # from the SAME source or the script's "we rebuild what the
      # orchestrator spawns" promise breaks. Pass through here so an
      # operator who exports CONTAINER_IMAGE in their shell (or sets
      # it in `.env`, which Compose reads directly without needing a
      # shell-export) gets a consistent override across the script and
      # the orchestrator. scripts/deploy.sh has matching .env-parsing
      # logic (data-only, no source) so both reach the same value.
      - CONTAINER_IMAGE=${CONTAINER_IMAGE:-nanoclaw-agent:latest}
    ports:
      # Credential proxy — agent containers reach it via host.docker.internal:3001
      - "3001:3001"
